# This file is a TEMPLATE, not something to apply directly — it's tracked
# in git so the required keys are documented, but it holds placeholder
# values on purpose. Real credentials should never be committed, even to
# a private repo.
#
# Create the actual Secret imperatively instead:
#
#   kubectl create secret generic postgres-secret \
#     --namespace intern \
#     --from-literal=db-name=appdb \
#     --from-literal=db-user=appuser \
#     --from-literal=db-password='<a real generated password>'
#
# That command puts the password on your shell history and in this
# process's argv, which is an acceptable tradeoff for a learning project
# but worth knowing — in a real team setting you'd read it from a file
# (--from-file) or use a secrets manager (AWS Secrets Manager, SOPS,
# Sealed Secrets) instead of a literal on the command line.

apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: intern
type: Opaque
stringData:
  db-name: appdb
  db-user: appuser
  db-password: apppassword
